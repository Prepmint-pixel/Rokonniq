<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROKONNIQ — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f3478;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #fff; padding: 24px; text-align: center;
    }
    .logo {
      width: 80px; height: 80px; border-radius: 22px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800; color: #fff;
      margin-bottom: 24px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 15px; color: rgba(255,255,255,0.65); max-width: 280px; line-height: 1.6; margin-bottom: 28px; }
    button {
      padding: 12px 28px; border-radius: 12px;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: rgba(255,255,255,0.3); }
    .status {
      margin-top: 20px; font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="logo">R</div>
  <h1>You're offline</h1>
  <p>No internet connection right now. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
  <div class="status" id="status"></div>
  <script>
    window.addEventListener('online', () => window.location.reload());
    document.getElementById('status').textContent =
      'Last visited: ' + (localStorage.getItem('rk_last_visit') || 'unknown');
    localStorage.setItem('rk_last_visit', new Date().toLocaleDateString());
  </script>
</body>
</html>
